services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./sandbox/data/rate-limits:/var/www/html/sandbox/data/rate-limits
    environment:
      MPCT_SANDBOX: "1"
      RATE_LIMIT_STORAGE: ${RATE_LIMIT_STORAGE:-json}
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
