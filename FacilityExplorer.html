<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Interactive floor plan of the MPaCT Lab — explore every room, instrument, and system in NAU's semiconductor research facility.">
    <meta name="theme-color" content="#002454">
    <title>Facility Explorer | MPaCT Lab — NAU Nano</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================================================================
           FACILITY EXPLORER — INTERACTIVE SHOWCASE MAP  v3
           Clean facility showcase. No construction artifacts.
           ================================================================ */

        .fex {
            padding: 100px 0 80px;
            background: linear-gradient(180deg, #f7f5f0 0%, #f0ede6 100%);
            position: relative; overflow: hidden;
        }
        .fex::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(0,36,84,0.02) 1px, transparent 1px);
            background-size: 28px 28px; pointer-events: none;
        }

        /* ── Header ────────────────────────────────────────── */
        .fex__header { text-align: center; margin-bottom: 44px; position: relative; z-index: 1; }
        .fex__eyebrow {
            display: inline-flex; align-items: center; gap: 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 2.5px;
            text-transform: uppercase; color: var(--nau-gold); margin-bottom: 14px;
        }
        .fex__eyebrow::before, .fex__eyebrow::after {
            content: ''; width: 24px; height: 2px;
            background: rgba(250,192,26,0.5); border-radius: 2px;
        }
        .fex__title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 800;
            color: var(--nau-blue); letter-spacing: -0.03em; margin: 0 0 14px;
        }
        .fex__title em { font-style: normal; color: var(--nau-gold); }
        .fex__subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem; color: #6b7280; line-height: 1.75;
            max-width: 540px; margin: 0 auto;
        }

        /* ── Layout ────────────────────────────────────────── */
        .fex__layout { position: relative; z-index: 1; display: flex; gap: 0; }

        /* ── Map Container ─────────────────────────────────── */
        .fex__map-wrap {
            flex: 1; min-width: 0;
            background: #fff;
            border-radius: 20px;
            border: 1px solid rgba(0,36,84,0.06);
            box-shadow: 0 4px 24px rgba(0,36,84,0.04), 0 12px 48px rgba(0,36,84,0.03);
            padding: 20px 24px 16px;
            position: relative;
            transition: border-radius 0.4s;
        }
        .fex__map-wrap.panel-open { border-radius: 20px 0 0 20px; }

        /* ── Toolbar ───────────────────────────────────────── */
        .fex__toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; padding: 0 4px; gap: 12px;
        }
        .fex__toolbar-title {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
            font-weight: 500; color: #9ca3af; text-transform: uppercase;
            letter-spacing: 1.5px; white-space: nowrap;
        }
        .fex__zoom-controls { display: flex; gap: 4px; }
        .fex__zoom-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: #f5f3ee; border: 1px solid rgba(0,36,84,0.06);
            cursor: pointer; font-size: 1rem; color: #9ca3af;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: 'DM Sans', sans-serif; font-weight: 500;
        }
        .fex__zoom-btn:hover { background: var(--nau-blue); color: #fff; border-color: var(--nau-blue); }
        .fex__zoom-level {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
            color: #9ca3af; min-width: 40px; text-align: center; line-height: 32px;
        }

        /* ── SVG viewport ──────────────────────────────────── */
        .fex__map-viewport {
            position: relative; overflow: hidden;
            border-radius: 14px; border: 1px solid rgba(0,36,84,0.04);
            background: #faf8f4;
            cursor: grab;
        }
        .fex__map-viewport:active, .fex__map-viewport.is-dragging { cursor: grabbing; }
        .fex__map {
            width: 100%; height: auto; display: block;
            transition: transform 0.3s cubic-bezier(0.25,1,0.5,1);
            transform-origin: center center;
        }

        /* ── SVG Room Styles ───────────────────────────────── */
        .fex-room { cursor: pointer; outline: none; }
        .fex-room > rect:first-of-type {
            stroke-width: 1.5;
            transition: fill 0.3s, stroke 0.3s, filter 0.3s, stroke-width 0.2s;
        }
        .fex-room:hover > rect:first-of-type {
            stroke-width: 2;
        }
        .fex-room.is-active > rect:first-of-type {
            stroke: var(--nau-gold) !important;
            stroke-width: 2.5;
            filter: drop-shadow(0 0 12px rgba(250,192,26,0.35));
        }
        .fex-room__name {
            font-family: 'DM Sans', sans-serif; font-size: 13px;
            font-weight: 700; fill: #1e293b; text-anchor: middle;
            pointer-events: none;
        }
        .fex-room__num {
            font-family: 'IBM Plex Mono', monospace; font-size: 9px;
            font-weight: 500; fill: #94a3b8; text-anchor: middle;
            pointer-events: none;
        }
        .fex-room__icon {
            font-family: 'Font Awesome 6 Free'; font-weight: 900;
            text-anchor: middle; dominant-baseline: central;
            pointer-events: none; opacity: 0.12;
        }

        /* Room type fills — warm, inviting */
        .fex-room--lab > rect:first-of-type        { fill: #dbeafe; stroke: #3b82f6; }
        .fex-room--cleanroom > rect:first-of-type   { fill: #fef3c7; stroke: #f59e0b; }
        .fex-room--instrument > rect:first-of-type  { fill: #ede9fe; stroke: #8b5cf6; }
        .fex-room--workspace > rect:first-of-type   { fill: #dcfce7; stroke: #22c55e; }
        .fex-room--support > rect:first-of-type     { fill: #f1f5f9; stroke: #94a3b8; }

        /* Room hover glow per type */
        .fex-room--lab:hover > rect:first-of-type        { filter: drop-shadow(0 0 10px rgba(59,130,246,0.25)); }
        .fex-room--cleanroom:hover > rect:first-of-type   { filter: drop-shadow(0 0 10px rgba(245,158,11,0.3)); }
        .fex-room--instrument:hover > rect:first-of-type  { filter: drop-shadow(0 0 10px rgba(139,92,246,0.25)); }
        .fex-room--workspace:hover > rect:first-of-type   { filter: drop-shadow(0 0 10px rgba(34,197,94,0.25)); }
        .fex-room--support:hover > rect:first-of-type     { filter: drop-shadow(0 0 8px rgba(148,163,184,0.25)); }

        /* Cleanroom subtle pulse */
        .fex-room--cleanroom > rect:first-of-type {
            animation: fexCleanPulse 5s ease-in-out infinite;
        }
        @keyframes fexCleanPulse {
            0%, 100% { fill: #fef3c7; }
            50%      { fill: #fde68a; }
        }
        .fex-room--cleanroom:hover > rect:first-of-type { animation: none !important; }

        /* Search highlight / dim */
        .fex-room.is-highlight > rect:first-of-type {
            stroke-width: 2.5;
            animation: fexPulse 1.2s ease-in-out infinite !important;
        }
        @keyframes fexPulse {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(250,192,26,0.4)); }
            50%      { filter: drop-shadow(0 0 16px rgba(250,192,26,0.7)); }
        }
        .fex-room.is-dimmed { opacity: 0.15; transition: opacity 0.3s; }
        .fex-room.is-dimmed:hover { opacity: 0.4; }

        /* Room entrance animation */
        .fex-room { opacity: 0; animation: fexRoomIn 0.5s ease forwards; }
        @keyframes fexRoomIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Building outline ─────────────────────────────── */
        .fex-building {
            fill: #faf8f3; stroke: #002454; stroke-width: 2.5;
            stroke-linejoin: round;
        }

        /* ── Corridor labels ──────────────────────────────── */
        .fex-corridor-label {
            font-family: 'IBM Plex Mono', monospace; font-size: 9px;
            font-weight: 500; fill: #c4b5a0; text-anchor: middle;
            letter-spacing: 2px; text-transform: uppercase;
            pointer-events: none;
        }

        /* ── Corridor fill ────────────────────────────────── */
        .fex-corridor-fill {
            fill: #f0ece3; stroke: none; pointer-events: none;
        }

        /* ── Entrance markers ─────────────────────────────── */
        .fex-entrance polygon { fill: var(--nau-blue); }
        .fex-entrance text {
            font-family: 'IBM Plex Mono', monospace; font-size: 8px;
            font-weight: 600; fill: var(--nau-blue); text-anchor: middle;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* ── Stairwell ────────────────────────────────────── */
        .fex-stairwell rect {
            fill: #f5f3ee; stroke: #d1cdc4; stroke-width: 1.2;
            stroke-dasharray: 6,4; rx: 8;
        }
        .fex-stairwell text {
            font-family: 'DM Sans', sans-serif; font-size: 11px;
            font-weight: 600; fill: #b8b0a2; text-anchor: middle;
        }
        .fex-stairwell .fex-stair-icon {
            font-family: 'Font Awesome 6 Free'; font-weight: 900;
            font-size: 20px; fill: #d1cdc4; text-anchor: middle;
            dominant-baseline: central;
        }

        /* ── Search Bar ───────────────────────────────────── */
        .fex__search-wrap { position: relative; flex: 1; max-width: 240px; }
        .fex__search {
            width: 100%; height: 34px;
            padding: 0 32px 0 34px;
            border: 1.5px solid rgba(0,36,84,0.06);
            border-radius: 10px; background: #f5f3ee;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem; color: var(--nau-blue);
            outline: none; transition: all 0.25s;
        }
        .fex__search:focus {
            border-color: var(--nau-blue); background: #fff;
            box-shadow: 0 0 0 3px rgba(0,36,84,0.05);
        }
        .fex__search::placeholder { color: #c4b5a0; }
        .fex__search-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            font-size: 0.72rem; color: #c4b5a0; pointer-events: none;
        }
        .fex__search-clear {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(0,36,84,0.06); border: none; cursor: pointer;
            font-size: 0.6rem; color: #9ca3af;
            display: none; align-items: center; justify-content: center;
        }
        .fex__search-clear.is-visible { display: flex; }
        .fex__search-clear:hover { background: rgba(0,36,84,0.12); }

        /* ── Category Filter ──────────────────────────────── */
        .fex__filters {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 14px; padding: 0 4px;
        }
        .fex__filter-btn {
            padding: 5px 14px; border-radius: 100px;
            border: 1.5px solid rgba(0,36,84,0.06);
            background: #f5f3ee; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem; font-weight: 600;
            color: #9ca3af; transition: all 0.2s; white-space: nowrap;
        }
        .fex__filter-btn:hover { border-color: var(--nau-blue); color: var(--nau-blue); }
        .fex__filter-btn.is-active {
            background: var(--nau-blue); color: #fff; border-color: var(--nau-blue);
        }

        /* ── Hover Tooltip ────────────────────────────────── */
        .fex__tooltip {
            position: absolute; z-index: 20;
            background: rgba(0,24,56,0.94);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; padding: 10px 16px;
            border-radius: 10px; pointer-events: none;
            transform: translate(-50%, -120%);
            opacity: 0; transition: opacity 0.18s;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 1px solid rgba(250,192,26,0.12);
        }
        .fex__tooltip.is-visible { opacity: 1; }
        .fex__tooltip-name {
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
            font-weight: 700; margin-bottom: 2px;
        }
        .fex__tooltip-type {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
            color: rgba(250,192,26,0.85); text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .fex__tooltip::after {
            content: ''; position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid rgba(0,24,56,0.94);
        }

        /* ── Legend ────────────────────────────────────────── */
        .fex__legend {
            display: flex; flex-wrap: wrap; gap: 18px; justify-content: center;
            margin-top: 18px; padding-top: 18px;
            border-top: 1px solid rgba(0,36,84,0.05);
        }
        .fex__legend-item {
            display: flex; align-items: center; gap: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem; font-weight: 600; color: #6b7280;
        }
        .fex__legend-swatch {
            width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid;
        }
        .fex__legend-swatch--lab        { background: #dbeafe; border-color: #3b82f6; }
        .fex__legend-swatch--cleanroom  { background: #fef3c7; border-color: #f59e0b; }
        .fex__legend-swatch--instrument { background: #ede9fe; border-color: #8b5cf6; }
        .fex__legend-swatch--workspace  { background: #dcfce7; border-color: #22c55e; }
        .fex__legend-swatch--support    { background: #f1f5f9; border-color: #94a3b8; }

        /* ── Info Panel ───────────────────────────────────── */
        .fex__panel {
            width: 380px; flex-shrink: 0;
            background: #fff; border-radius: 0 20px 20px 0;
            border: 1px solid rgba(0,36,84,0.06); border-left: none;
            box-shadow: 8px 0 40px rgba(0,36,84,0.04);
            transform: translateX(-100%); opacity: 0;
            max-height: 0; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25,1,0.5,1),
                        opacity 0.4s ease, max-height 0.4s ease;
            pointer-events: none;
            position: absolute; right: 0; top: 0; bottom: 0;
        }
        .fex__panel.is-open {
            transform: translateX(0); opacity: 1;
            max-height: none; overflow-y: auto;
            pointer-events: auto; position: relative;
        }
        .fex__panel-close {
            position: sticky; top: 12px; float: right; margin: 12px 12px 0 0;
            width: 36px; height: 36px; border-radius: 50%;
            background: #f5f3ee; border: none; cursor: pointer;
            font-size: 1.2rem; color: #9ca3af;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s; z-index: 2;
        }
        .fex__panel-close:hover { background: var(--nau-blue); color: #fff; }
        .fex__panel-content { padding: 32px 28px 40px; clear: both; }
        .fex__panel-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; margin-bottom: 18px;
        }
        .fex__panel-icon--lab        { background: rgba(59,130,246,0.1); color: #3b82f6; }
        .fex__panel-icon--cleanroom  { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .fex__panel-icon--instrument { background: rgba(139,92,246,0.1); color: #8b5cf6; }
        .fex__panel-icon--workspace  { background: rgba(34,197,94,0.1); color: #22c55e; }
        .fex__panel-icon--support    { background: rgba(148,163,184,0.1); color: #94a3b8; }
        .fex__panel-type {
            display: inline-block; font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px; color: var(--nau-gold);
            background: rgba(250,192,26,0.08); border: 1px solid rgba(250,192,26,0.18);
            padding: 4px 12px; border-radius: 100px; margin-bottom: 14px;
        }
        .fex__panel-name {
            font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800;
            color: var(--nau-blue); letter-spacing: -0.02em; margin: 0 0 4px;
        }
        .fex__panel-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem; font-weight: 500; color: #94a3b8; margin-bottom: 18px;
        }
        .fex__panel-desc {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; color: #6b7280; line-height: 1.75; margin-bottom: 24px;
        }
        .fex__panel-features-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: #94a3b8; margin-bottom: 12px;
        }
        .fex__panel-features { list-style: none; padding: 0; margin: 0 0 24px; }
        .fex__panel-features li {
            display: flex; align-items: center; gap: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem; font-weight: 500; color: #1e293b;
            padding: 8px 0; border-bottom: 1px solid rgba(0,36,84,0.04);
        }
        .fex__panel-features li:last-child { border-bottom: none; }
        .fex__panel-features li i { color: var(--nau-gold); font-size: 0.7rem; width: 16px; text-align: center; }
        .fex__panel-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fex__panel-meta-item { background: #f5f3ee; border-radius: 12px; padding: 14px 16px; }
        .fex__panel-meta-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: #94a3b8; margin-bottom: 4px;
        }
        .fex__panel-meta-value {
            font-family: 'Montserrat', sans-serif; font-size: 1.1rem;
            font-weight: 800; color: var(--nau-blue);
        }

        /* ── Mini-map ─────────────────────────────────────── */
        .fex__minimap {
            position: absolute; bottom: 14px; left: 14px;
            width: 150px; height: 96px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(0,36,84,0.06);
            border-radius: 10px; overflow: hidden;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            z-index: 15;
        }
        .fex__minimap.is-visible { opacity: 1; pointer-events: auto; }
        .fex__minimap svg { width: 100%; height: 100%; }
        .fex__minimap-vp {
            fill: rgba(250,192,26,0.1); stroke: var(--nau-gold);
            stroke-width: 3; rx: 2;
        }

        /* ── Room count ───────────────────────────────────── */
        .fex__room-count {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem; color: #94a3b8; line-height: 34px;
        }

        /* ── Mobile ───────────────────────────────────────── */
        @media (max-width: 900px) {
            .fex { padding: 60px 0 40px; }
            .fex__layout { flex-direction: column; }
            .fex__map-wrap { border-radius: 16px; padding: 14px 16px 12px; }
            .fex__map-wrap.panel-open { border-radius: 16px 16px 0 0; }
            .fex__panel {
                width: 100%; position: relative;
                border-radius: 0 0 16px 16px;
                border: 1px solid rgba(0,0,0,0.06); border-top: none;
                transform: translateY(-20px);
                box-shadow: 0 8px 40px rgba(0,0,0,0.04);
            }
            .fex__panel.is-open { transform: translateY(0); }
            .fex__panel-content { padding: 24px 20px 32px; }
            .fex__tooltip { display: none; }
            .fex__search-wrap { max-width: 180px; }
            .fex__filters { gap: 4px; }
            .fex__filter-btn { padding: 4px 10px; font-size: 0.6rem; }
            .fex__minimap { display: none; }
        }
        @media (max-width: 600px) {
            .fex__map-wrap { padding: 10px 12px 10px; }
            .fex__map-viewport { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .fex__map { min-width: 580px; }
            .fex__legend { gap: 8px; }
            .fex__legend-item { font-size: 0.62rem; gap: 5px; }
            .fex__legend-swatch { width: 11px; height: 11px; }
            .fex__search-wrap { max-width: 140px; }
            .fex__toolbar { flex-wrap: wrap; gap: 6px; }
        }
    </style>
</head>

<body class="facility-page">

    <site-header></site-header>

    <main>
        <section class="fex">
            <div class="container">

                <div class="fex__header">
                    <div class="fex__eyebrow">Facility Explorer</div>
                    <h2 class="fex__title">Explore the <em>MPaCT Lab</em></h2>
                    <p class="fex__subtitle">Interactive floor plan of Building 98E. Tap any room to discover the instruments, systems, and capabilities inside.</p>
                </div>

                <div class="fex__layout">
                    <div class="fex__map-wrap" id="fex-map-wrap">

                        <!-- Toolbar -->
                        <div class="fex__toolbar">
                            <span class="fex__toolbar-title">Building 98E &mdash; First Floor</span>
                            <div class="fex__search-wrap">
                                <i class="fas fa-search fex__search-icon"></i>
                                <input class="fex__search" id="fex-search" type="text" placeholder="Search rooms..." autocomplete="off"/>
                                <button class="fex__search-clear" id="fex-search-clear" aria-label="Clear search">&times;</button>
                            </div>
                            <span class="fex__room-count" id="fex-room-count">16 rooms</span>

                '<div class="fex__panel-num">' + d.number + '</div>' +
                '<p class="fex__panel-desc">' + d.desc + '</p>' +
                '<div class="fex__panel-features-title">Key Features &amp; Equipment</div>' +
                '<ul class="fex__panel-features">' + fl + '</ul>' +
                '<div class="fex__panel-meta">' +
                    '<div class="fex__panel-meta-item"><div class="fex__panel-meta-label">Capacity</div><div class="fex__panel-meta-value">' + d.capacity + '</div></div>' +
                    '<div class="fex__panel-meta-item"><div class="fex__panel-meta-label">Area</div><div class="fex__panel-meta-value">' + d.sqft + '</div></div>' +
                '</div>';

            rooms.forEach(function (r) { r.classList.remove('is-active'); });
            var target = document.querySelector('[data-room="' + roomId + '"]');
            if (target) target.classList.add('is-active');
            activeRoom = roomId;

            panel.classList.add('is-open');
            mapWrap.classList.add('panel-open');
        }

        function closePanel() {
            panel.classList.remove('is-open');
            mapWrap.classList.remove('panel-open');
            rooms.forEach(function (r) { r.classList.remove('is-active'); });
            activeRoom = null;
        }

        /* ── TOOLTIP ─────────────────────────────────────── */
        rooms.forEach(function (room) {
            room.addEventListener('mouseenter', function (e) {
                var id = room.getAttribute('data-room');
                var d = roomData[id];
                if (!d) return;
                tooltipName.textContent = d.name;
                tooltipType.textContent = d.type;
                tooltip.classList.add('is-visible');
            });
            room.addEventListener('mousemove', function (e) {
                var rect = mapWrap.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left) + 'px';
                tooltip.style.top  = (e.clientY - rect.top)  + 'px';
            });
            room.addEventListener('mouseleave', function () {
                tooltip.classList.remove('is-visible');
            });

            room.addEventListener('click', function () {
                tooltip.classList.remove('is-visible');
                var id = room.getAttribute('data-room');
                if (activeRoom === id) { closePanel(); }
                else { openPanel(id); }
            });
            room.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); room.click(); }
            });
        });

        closeBtn.addEventListener('click', closePanel);
        document.addEventListener('click', function (e) {
            if (activeRoom && !panel.contains(e.target) && !e.target.closest('.fex-room') && !e.target.closest('.fex__zoom-btn') && !e.target.closest('.fex__search-wrap') && !e.target.closest('.fex__filter-btn')) {
                closePanel();
            }
        });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePanel(); });

        /* ── SEARCH ─────────────────────────────────────── */
        function runSearch() {
            var q = searchInput.value.trim().toLowerCase();
            searchClear.classList.toggle('is-visible', q.length > 0);

            var matchCount = 0;
            rooms.forEach(function (room) {
                var id = room.getAttribute('data-room');
                var d = roomData[id];
                if (!d) return;

                var text = (d.name + ' ' + d.number + ' ' + d.type + ' ' + d.desc + ' ' + d.features.join(' ')).toLowerCase();
                var matchesSearch = q.length === 0 || text.indexOf(q) !== -1;
                var matchesFilter = activeFilter === 'all' || d.typeClass === activeFilter;
                var show = matchesSearch && matchesFilter;

                room.classList.toggle('is-dimmed', !show);
                room.classList.toggle('is-highlight', show && q.length > 0);
                if (show) matchCount++;
            });

            roomCountEl.textContent = matchCount + ' room' + (matchCount !== 1 ? 's' : '');
        }

        searchInput.addEventListener('input', runSearch);
        searchClear.addEventListener('click', function () {
            searchInput.value = '';
            runSearch();
            searchInput.focus();
        });

        /* ── CATEGORY FILTER ────────────────────────────── */
        filterBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                filterBtns.forEach(function (b) { b.classList.remove('is-active'); });
                btn.classList.add('is-active');
                activeFilter = btn.getAttribute('data-filter');
                runSearch();
            });
        });

        /* ── ZOOM / PAN ──────────────────────────────────── */
        var scale = 1;
        var minScale = 0.8;
        var maxScale = 3;
        var panX = 0, panY = 0;
        var isDragging = false;
        var dragStartX, dragStartY, startPanX, startPanY;
        var zoomLevel = document.getElementById('fex-zoom-level');

        function applyTransform() {
            svgEl.style.transform = 'scale(' + scale + ') translate(' + panX + 'px,' + panY + 'px)';
            zoomLevel.textContent = Math.round(scale * 100) + '%';
            updateMinimap();
        }

        function updateMinimap() {
            if (scale > 1.05) {
                minimap.classList.add('is-visible');
                var vw = 1200 / scale;
                var vh = 760 / scale;
                var vx = (-panX * scale + (1200 * (scale - 1)) / 2) / scale;
                var vy = (-panY * scale + (760 * (scale - 1)) / 2) / scale;
                vx = Math.max(0, Math.min(1200 - vw, vx));
                vy = Math.max(0, Math.min(760 - vh, vy));
                minimapVP.setAttribute('x', vx);
                minimapVP.setAttribute('y', vy);
                minimapVP.setAttribute('width', vw);
                minimapVP.setAttribute('height', vh);
            } else {
                minimap.classList.remove('is-visible');
            }
        }

        document.getElementById('fex-zoom-in').addEventListener('click', function () {
            scale = Math.min(maxScale, scale + 0.25);
            applyTransform();
        });
        document.getElementById('fex-zoom-out').addEventListener('click', function () {
            scale = Math.max(minScale, scale - 0.25);
            if (scale <= 1) { panX = 0; panY = 0; }
            applyTransform();
        });
        document.getElementById('fex-zoom-reset').addEventListener('click', function () {
            scale = 1; panX = 0; panY = 0;
            applyTransform();
        });

        viewport.addEventListener('wheel', function (e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.max(minScale, Math.min(maxScale, scale + delta));
            if (scale <= 1) { panX = 0; panY = 0; }
            applyTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', function (e) {
            if (scale <= 1 || e.target.closest('.fex-room')) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            startPanX = panX;
            startPanY = panY;
            viewport.classList.add('is-dragging');
        });
        document.addEventListener('mousemove', function (e) {
            if (!isDragging) return;
            panX = startPanX + (e.clientX - dragStartX) / scale;
            panY = startPanY + (e.clientY - dragStartY) / scale;
            applyTransform();
        });
        document.addEventListener('mouseup', function () {
            isDragging = false;
            viewport.classList.remove('is-dragging');
        });

        /* ── TOUCH PINCH ZOOM & PAN ──────────────────────── */
        var touchStartDist = 0;
        var touchStartScale = 1;
        var touchStartPanX = 0, touchStartPanY = 0;
        var touchStartX = 0, touchStartY = 0;
        var isTouchPanning = false;

        function getTouchDist(t1, t2) {
            var dx = t1.clientX - t2.clientX;
            var dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        viewport.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                touchStartDist = getTouchDist(e.touches[0], e.touches[1]);
                touchStartScale = scale;
            } else if (e.touches.length === 1 && scale > 1) {
                isTouchPanning = true;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartPanX = panX;
                touchStartPanY = panY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var dist = getTouchDist(e.touches[0], e.touches[1]);
                var newScale = touchStartScale * (dist / touchStartDist);
                scale = Math.max(minScale, Math.min(maxScale, newScale));
                if (scale <= 1) { panX = 0; panY = 0; }
                applyTransform();
            } else if (e.touches.length === 1 && isTouchPanning) {
                e.preventDefault();
                panX = touchStartPanX + (e.touches[0].clientX - touchStartX) / scale;
                panY = touchStartPanY + (e.touches[0].clientY - touchStartY) / scale;
                applyTransform();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', function () {
            isTouchPanning = false;
        });

        /* ── KEYBOARD NAV ────────────────────────────────── */
        var roomIds = Object.keys(roomData);
        document.addEventListener('keydown', function (e) {
            if (e.target === searchInput) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                var idx = activeRoom ? roomIds.indexOf(activeRoom) : -1;
                idx = (idx + 1) % roomIds.length;
                openPanel(roomIds[idx]);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                var idx = activeRoom ? roomIds.indexOf(activeRoom) : roomIds.length;
                idx = (idx - 1 + roomIds.length) % roomIds.length;
                openPanel(roomIds[idx]);
            }
        });

    })();
    </script>

</body>
</html>
