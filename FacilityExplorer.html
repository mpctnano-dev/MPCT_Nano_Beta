<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Interactive floor plan of the MPaCT Lab — explore every room, instrument, and system in NAU's semiconductor research facility.">
    <meta name="theme-color" content="#002454">
    <title>Facility Explorer | MPaCT Lab — NAU Nano</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================================================================
           FACILITY EXPLORER — INTERACTIVE FLOOR PLAN  v2
           ================================================================ */

        .fex {
            padding: 100px 0 80px;
            background: #f4f5f8;
            position: relative; overflow: hidden;
        }
        .fex::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                radial-gradient(circle, rgba(0,36,84,0.035) 1px, transparent 1px);
            background-size: 24px 24px; pointer-events: none;
        }

        /* ── Header ────────────────────────────────────────── */
        .fex__header { text-align: center; margin-bottom: 40px; position: relative; z-index: 1; }
        .fex__eyebrow {
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 0.68rem; font-weight: 700; letter-spacing: 2.2px;
            text-transform: uppercase; color: var(--nau-gold); margin-bottom: 14px;
        }
        .fex__eyebrow::before, .fex__eyebrow::after {
            content: ''; width: 20px; height: 2px;
            background: rgba(250,192,26,0.55); border-radius: 2px;
        }
        .fex__title {
            font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800;
            color: var(--nau-blue); letter-spacing: -0.025em; margin: 0 0 14px;
        }
        .fex__title em { font-style: normal; color: var(--nau-gold); }
        .fex__subtitle {
            font-size: 1rem; color: var(--gray-500); line-height: 1.75;
            max-width: 520px; margin: 0 auto;
        }

        /* ── Layout ────────────────────────────────────────── */
        .fex__layout { position: relative; z-index: 1; display: flex; gap: 0; }

        /* ── Map Container ─────────────────────────────────── */
        .fex__map-wrap {
            flex: 1; min-width: 0;
            background: #fff;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 8px 40px rgba(0,0,0,0.06);
            padding: 20px 24px 16px;
            position: relative;
            transition: border-radius 0.4s;
        }
        .fex__map-wrap.panel-open { border-radius: 20px 0 0 20px; }

        /* Map toolbar */
        .fex__toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; padding: 0 4px;
        }
        .fex__toolbar-title {
            font-family: 'Roboto Mono', monospace; font-size: 0.68rem;
            font-weight: 500; color: var(--gray-400); text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .fex__zoom-controls { display: flex; gap: 4px; }
        .fex__zoom-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: #f0f2f5; border: 1px solid rgba(0,0,0,0.06);
            cursor: pointer; font-size: 1rem; color: var(--gray-500);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: 'Roboto', sans-serif; font-weight: 500;
        }
        .fex__zoom-btn:hover { background: var(--nau-blue); color: #fff; border-color: var(--nau-blue); }
        .fex__zoom-level {
            font-family: 'Roboto Mono', monospace; font-size: 0.65rem;
            color: var(--gray-400); min-width: 40px; text-align: center;
            line-height: 32px;
        }

        /* SVG container with zoom/pan */
        .fex__map-viewport {
            position: relative; overflow: hidden;
            border-radius: 12px; border: 1px solid rgba(0,0,0,0.04);
            background: #fbfbfd;
            cursor: grab;
        }
        .fex__map-viewport:active { cursor: grabbing; }
        .fex__map-viewport.is-dragging { cursor: grabbing; }
        .fex__map {
            width: 100%; height: auto; display: block;
            transition: transform 0.3s cubic-bezier(0.25,1,0.5,1);
            transform-origin: center center;
        }

        /* ── SVG Room Styles ───────────────────────────────── */
        .fex-room { cursor: pointer; outline: none; }
        .fex-room > rect {
            stroke-width: 1.8;
            transition: fill 0.25s, stroke 0.25s, filter 0.25s, stroke-width 0.2s;
        }
        .fex-room:hover > rect, .fex-room:focus > rect {
            filter: brightness(0.93);
            stroke-width: 2.2;
        }
        .fex-room.is-active > rect {
            stroke: var(--nau-gold) !important;
            stroke-width: 2.8;
            filter: drop-shadow(0 0 8px rgba(250,192,26,0.4));
        }
        .fex-room__name {
            font-family: 'Roboto', sans-serif; font-size: 12px;
            font-weight: 700; fill: var(--nau-blue); text-anchor: middle;
            pointer-events: none;
        }
        .fex-room__num {
            font-family: 'Roboto Mono', monospace; font-size: 9px;
            font-weight: 400; fill: rgba(0,36,84,0.4); text-anchor: middle;
            pointer-events: none;
        }

        /* Room type fills */
        .fex-room--lab > rect         { fill: #dce8f7; stroke: #4a7cc5; }
        .fex-room--cleanroom > rect   { fill: #fef3cd; stroke: #c9a227; }
        .fex-room--instrument > rect  { fill: #e8def8; stroke: #7c5cbf; }
        .fex-room--workspace > rect   { fill: #d4edda; stroke: #3a8f5c; }
        .fex-room--support > rect     { fill: #ecedf0; stroke: #8a8d95; }

        /* Equipment inside rooms */
        .fex-equip { fill: none; stroke-width: 0.8; pointer-events: none; }
        .fex-equip--lab       { stroke: rgba(74,124,197,0.3); }
        .fex-equip--cleanroom { stroke: rgba(201,162,39,0.35); }
        .fex-equip--instrument{ stroke: rgba(124,92,191,0.3); }
        .fex-equip--workspace { stroke: rgba(58,143,92,0.3); }
        .fex-equip--support   { stroke: rgba(138,141,149,0.25); }
        .fex-equip-fill { fill: rgba(0,36,84,0.03); pointer-events: none; }

        /* Door arcs */
        .fex-door { fill: none; stroke: rgba(0,36,84,0.2); stroke-width: 0.8; pointer-events: none; }
        .fex-door-gap { stroke: none; pointer-events: none; }

        /* Occupancy circles */
        .fex-occ { pointer-events: none; }
        .fex-occ circle { fill: #fff; stroke: rgba(0,36,84,0.25); stroke-width: 1; }
        .fex-occ text {
            font-family: 'Roboto', sans-serif; font-size: 7.5px;
            font-weight: 700; fill: rgba(0,36,84,0.45); text-anchor: middle;
            dominant-baseline: central;
        }

        /* Building outline */
        .fex-building { fill: #f0f2f5; stroke: #002454; stroke-width: 3; stroke-linejoin: miter; }

        /* Internal walls */
        .fex-wall { fill: none; stroke: #002454; stroke-width: 2; stroke-linecap: round; }
        .fex-wall--thin { stroke-width: 1.2; }
        .fex-wall--partition { stroke-width: 1; stroke-dasharray: 3,2; stroke: rgba(0,36,84,0.3); }

        /* Corridors */
        .fex-corridor { fill: none; stroke: rgba(0,36,84,0.12); stroke-width: 1.2; stroke-dasharray: 8,5; }

        /* Exits */
        .fex-exit line { stroke: #dc3545; stroke-width: 2; stroke-linecap: round; }
        .fex-exit__label {
            font-family: 'Roboto Mono', monospace; font-size: 7px;
            font-weight: 700; fill: rgba(220,53,69,0.6); text-anchor: middle;
        }

        /* North arrow */
        .fex-north__letter {
            font-family: 'Montserrat', sans-serif; font-size: 14px;
            font-weight: 900; fill: #002454; text-anchor: middle;
        }

        /* Title block */
        .fex-title-block rect { fill: none; stroke: #002454; stroke-width: 1.5; }
        .fex-title-block text {
            font-family: 'Roboto', sans-serif; fill: #002454; text-anchor: start;
        }
        .fex-title-block__main { font-size: 9px; font-weight: 700; letter-spacing: 1px; }
        .fex-title-block__sub  { font-size: 6.5px; font-weight: 400; fill: rgba(0,36,84,0.5) !important; }
        .fex-title-block__id   { font-size: 7px; font-weight: 700; }
        .fex-title-block__scale{ font-family: 'Roboto Mono', monospace; font-size: 6.5px; font-weight: 400; fill: rgba(0,36,84,0.5) !important; }

        /* Stairwell */
        .fex-stairwell rect { fill: #e8e8e8; stroke: #999; stroke-width: 1; stroke-dasharray: 4,3; }
        .fex-stairwell text {
            font-family: 'Roboto', sans-serif; font-size: 10px;
            font-weight: 500; fill: rgba(0,0,0,0.25); text-anchor: middle;
        }
        .fex-stairwell line { stroke: #bbb; stroke-width: 0.7; }

        /* Dimension lines */
        .fex-dim line { stroke: rgba(0,36,84,0.2); stroke-width: 0.8; }
        .fex-dim text {
            font-family: 'Roboto Mono', monospace; font-size: 7px;
            fill: rgba(0,36,84,0.3); text-anchor: middle;
        }

        /* Scale bar */
        .fex-scale text {
            font-family: 'Roboto Mono', monospace; font-size: 7px;
            fill: rgba(0,36,84,0.4); text-anchor: middle;
        }
        .fex-scale line { stroke: #002454; stroke-width: 1.5; stroke-opacity: 0.35; }

        /* FEC markers */
        .fex-fec rect { fill: none; stroke: rgba(0,36,84,0.15); stroke-width: 0.7; }
        .fex-fec text {
            font-family: 'Roboto Mono', monospace; font-size: 5.5px;
            fill: rgba(0,36,84,0.2); text-anchor: middle; font-weight: 500;
        }

        /* ── Hover Tooltip ─────────────────────────────────── */
        .fex__tooltip {
            position: absolute; z-index: 20;
            background: rgba(0,24,56,0.92);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: #fff; padding: 8px 14px;
            border-radius: 8px; pointer-events: none;
            transform: translate(-50%, -120%);
            opacity: 0; transition: opacity 0.18s;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            border: 1px solid rgba(250,192,26,0.15);
        }
        .fex__tooltip.is-visible { opacity: 1; }
        .fex__tooltip-name {
            font-family: 'Roboto', sans-serif; font-size: 0.78rem;
            font-weight: 700; margin-bottom: 2px;
        }
        .fex__tooltip-type {
            font-family: 'Roboto Mono', monospace; font-size: 0.6rem;
            color: rgba(250,192,26,0.8); text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .fex__tooltip::after {
            content: ''; position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid rgba(0,24,56,0.92);
        }

        /* ── Legend ─────────────────────────────────────────── */
        .fex__legend {
            display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        .fex__legend-item {
            display: flex; align-items: center; gap: 7px;
            font-size: 0.72rem; font-weight: 600; color: var(--gray-500);
        }
        .fex__legend-swatch {
            width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid;
        }
        .fex__legend-swatch--lab        { background: #dce8f7; border-color: #4a7cc5; }
        .fex__legend-swatch--cleanroom  { background: #fef3cd; border-color: #c9a227; }
        .fex__legend-swatch--instrument { background: #e8def8; border-color: #7c5cbf; }
        .fex__legend-swatch--workspace  { background: #d4edda; border-color: #3a8f5c; }
        .fex__legend-swatch--support    { background: #ecedf0; border-color: #8a8d95; }

        /* ── Info Panel ────────────────────────────────────── */
        .fex__panel {
            width: 380px; flex-shrink: 0;
            background: #fff; border-radius: 0 20px 20px 0;
            border: 1px solid rgba(0,0,0,0.06); border-left: none;
            box-shadow: 8px 0 40px rgba(0,0,0,0.06);
            transform: translateX(-100%); opacity: 0;
            max-height: 0; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25,1,0.5,1),
                        opacity 0.4s ease, max-height 0.4s ease;
            pointer-events: none;
            position: absolute; right: 0; top: 0; bottom: 0;
        }
        .fex__panel.is-open {
            transform: translateX(0); opacity: 1;
            max-height: none; overflow-y: auto;
            pointer-events: auto; position: relative;
        }
        .fex__panel-close {
            position: sticky; top: 12px; float: right; margin: 12px 12px 0 0;
            width: 36px; height: 36px; border-radius: 50%;
            background: #f0f2f5; border: none; cursor: pointer;
            font-size: 1.2rem; color: var(--gray-500);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s; z-index: 2;
        }
        .fex__panel-close:hover { background: var(--nau-blue); color: #fff; }
        .fex__panel-content { padding: 32px 28px 40px; clear: both; }
        .fex__panel-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; margin-bottom: 18px;
        }
        .fex__panel-icon--lab        { background: rgba(74,124,197,0.12); color: #4a7cc5; }
        .fex__panel-icon--cleanroom  { background: rgba(201,162,39,0.12); color: #c9a227; }
        .fex__panel-icon--instrument { background: rgba(124,92,191,0.12); color: #7c5cbf; }
        .fex__panel-icon--workspace  { background: rgba(58,143,92,0.12); color: #3a8f5c; }
        .fex__panel-icon--support    { background: rgba(138,141,149,0.12); color: #8a8d95; }
        .fex__panel-type {
            display: inline-block; font-size: 0.62rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px; color: var(--nau-gold);
            background: rgba(250,192,26,0.10); border: 1px solid rgba(250,192,26,0.22);
            padding: 4px 12px; border-radius: 100px; margin-bottom: 14px;
        }
        .fex__panel-name {
            font-family: var(--font-display); font-size: 1.5rem; font-weight: 800;
            color: var(--nau-blue); letter-spacing: -0.02em; margin: 0 0 4px;
        }
        .fex__panel-num {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem; font-weight: 500; color: var(--gray-400); margin-bottom: 18px;
        }
        .fex__panel-desc {
            font-size: 0.9rem; color: var(--gray-600); line-height: 1.75; margin-bottom: 24px;
        }
        .fex__panel-features-title {
            font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--gray-400); margin-bottom: 12px;
        }
        .fex__panel-features { list-style: none; padding: 0; margin: 0 0 24px; }
        .fex__panel-features li {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.85rem; font-weight: 500; color: var(--nau-blue);
            padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .fex__panel-features li:last-child { border-bottom: none; }
        .fex__panel-features li i { color: var(--nau-gold); font-size: 0.7rem; width: 16px; text-align: center; }
        .fex__panel-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fex__panel-meta-item { background: #f8f9fb; border-radius: 10px; padding: 14px 16px; }
        .fex__panel-meta-label {
            font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--gray-400); margin-bottom: 4px;
        }
        .fex__panel-meta-value {
            font-family: var(--font-display); font-size: 1.1rem;
            font-weight: 800; color: var(--nau-blue);
        }

        /* ── Room entrance animation ───────────────────────── */
        .fex-room { opacity: 0; animation: fexRoomIn 0.5s ease forwards; }
        @keyframes fexRoomIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Cleanroom subtle pulse */
        .fex-room--cleanroom > rect:first-of-type {
            animation: fexCleanPulse 4s ease-in-out infinite;
        }
        @keyframes fexCleanPulse {
            0%, 100% { fill: #fef3cd; }
            50%      { fill: #fdf0b8; }
        }

        /* ── Room Hover Glow ──────────────────────────────── */
        .fex-room--lab:hover > rect:first-of-type        { filter: drop-shadow(0 0 8px rgba(74,124,197,0.35)); }
        .fex-room--cleanroom:hover > rect:first-of-type  { filter: drop-shadow(0 0 8px rgba(201,162,39,0.4)); animation: none !important; }
        .fex-room--instrument:hover > rect:first-of-type { filter: drop-shadow(0 0 8px rgba(124,92,191,0.35)); }
        .fex-room--workspace:hover > rect:first-of-type  { filter: drop-shadow(0 0 8px rgba(58,143,92,0.35)); }
        .fex-room--support:hover > rect:first-of-type    { filter: drop-shadow(0 0 6px rgba(138,141,149,0.3)); }
        .fex-room.is-highlight > rect:first-of-type {
            stroke-width: 3;
            animation: fexSearchPulse 1.2s ease-in-out infinite !important;
        }
        @keyframes fexSearchPulse {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(250,192,26,0.4)); }
            50%      { filter: drop-shadow(0 0 14px rgba(250,192,26,0.7)); }
        }
        .fex-room.is-dimmed { opacity: 0.2; transition: opacity 0.3s; }
        .fex-room.is-dimmed:hover { opacity: 0.5; }

        /* ── Search Bar ───────────────────────────────────── */
        .fex__search-wrap {
            position: relative; flex: 1; max-width: 240px;
        }
        .fex__search {
            width: 100%; height: 34px;
            padding: 0 32px 0 34px;
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 10px; background: #f8f9fb;
            font-family: 'Roboto', sans-serif;
            font-size: 0.78rem; color: var(--nau-blue);
            outline: none; transition: all 0.25s;
        }
        .fex__search:focus {
            border-color: var(--nau-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,36,84,0.06);
        }
        .fex__search::placeholder { color: var(--gray-300); }
        .fex__search-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            font-size: 0.72rem; color: var(--gray-300); pointer-events: none;
        }
        .fex__search-clear {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(0,0,0,0.06); border: none; cursor: pointer;
            font-size: 0.6rem; color: var(--gray-400);
            display: none; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .fex__search-clear.is-visible { display: flex; }
        .fex__search-clear:hover { background: rgba(0,0,0,0.12); }

        /* ── Category Filter ──────────────────────────────── */
        .fex__filters {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 12px; padding: 0 4px;
        }
        .fex__filter-btn {
            padding: 5px 13px; border-radius: 100px;
            border: 1.5px solid rgba(0,0,0,0.06);
            background: #f8f9fb; cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-size: 0.65rem; font-weight: 600;
            color: var(--gray-500);
            transition: all 0.2s; white-space: nowrap;
        }
        .fex__filter-btn:hover { border-color: var(--nau-blue); color: var(--nau-blue); }
        .fex__filter-btn.is-active {
            background: var(--nau-blue); color: #fff;
            border-color: var(--nau-blue);
        }

        /* ── Internal Walls ───────────────────────────────── */
        .fex-iwall { fill: none; stroke: #002454; stroke-width: 2.2; stroke-linecap: butt; }
        .fex-iwall--thin { stroke-width: 1.4; }
        .fex-iwall--light { stroke-width: 1; stroke: rgba(0,36,84,0.45); }

        /* ── REF label ────────────────────────────────────── */
        .fex-ref text {
            font-family: 'Roboto Mono', monospace; font-size: 7px;
            fill: rgba(0,36,84,0.3); text-anchor: middle; font-weight: 500;
        }
        .fex-ref rect {
            fill: #f0f2f5; stroke: rgba(0,36,84,0.2); stroke-width: 0.8;
        }

        /* ── Mini-map (zoomed overlay) ────────────────────── */
        .fex__minimap {
            position: absolute; bottom: 14px; left: 14px;
            width: 150px; height: 96px;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 8px; overflow: hidden;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            z-index: 15;
        }
        .fex__minimap.is-visible { opacity: 1; pointer-events: auto; }
        .fex__minimap svg { width: 100%; height: 100%; }
        .fex__minimap-vp {
            fill: rgba(250,192,26,0.12); stroke: var(--nau-gold);
            stroke-width: 3; rx: 2;
        }

        /* ── Room count badge ─────────────────────────────── */
        .fex__room-count {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.62rem; color: var(--gray-400);
            line-height: 34px;
        }

        /* ── Mobile ────────────────────────────────────────── */
        @media (max-width: 900px) {
            .fex { padding: 60px 0 40px; }
            .fex__layout { flex-direction: column; }
            .fex__map-wrap { border-radius: 16px; padding: 14px 16px 12px; }

                    <div class="fex__panel" id="fex-panel">
                        <button class="fex__panel-close" id="fex-close" aria-label="Close panel">&times;</button>
                        <div class="fex__panel-content" id="fex-content"></div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <script src="JS/layout.js"></script>
    <script src="JS/script.js"></script>

    <script>
    (function () {
        'use strict';

        /* ── Room Data ───────────────────────────────────── */
        var roomData = {
            'lab-1': {
                name: 'Lab 1', number: 'Room 102', type: 'Research Lab', typeClass: 'lab',
                icon: 'fas fa-vial',
                desc: 'General purpose research lab for sample preparation, material handling, and basic processing. Equipped with benchtop instruments for initial material prep and post-processing analysis.',
                features: ['Sample Prep Stations', 'Basic Instruments', 'Fume Hood', 'Microscope Station'],
                capacity: 13, sqft: '~450 sq ft'
            },
            'lab-2': {
                name: 'Lab 2', number: 'Room 103', type: 'Characterization Lab', typeClass: 'lab',
                icon: 'fas fa-microscope',
                desc: 'Materials characterization suite housing scanning electron microscopy (SEM), atomic force microscopy (AFM), and optical imaging systems for surface analysis at the nanoscale.',
                features: ['SEM', 'AFM', 'Optical Microscopy', 'Image Analysis Workstation'],
                capacity: 13, sqft: '~420 sq ft'
            },
            'lab-3': {
                name: 'Lab 3', number: 'Room 104', type: 'Processing Lab', typeClass: 'lab',
                icon: 'fas fa-flask',
                desc: 'Chemical processing area with wet benches, fume hoods, and acid/base handling systems for semiconductor cleaning, etching, and photoresist development.',
                features: ['Wet Benches', 'Fume Hoods', 'Chemical Storage', 'DI Water System'],
                capacity: 13, sqft: '~480 sq ft'
            },
            'lab-4': {
                name: 'Lab 4 \u2014 Cleanroom', number: 'Room 105', type: 'ISO 6 Cleanroom', typeClass: 'cleanroom',
                icon: 'fas fa-microchip',
                desc: 'ISO 6 (Class 1000) cleanroom for photolithography, thin film deposition, and controlled environment semiconductor processing. Features HEPA-filtered ceiling, positive pressure, and continuous particle monitoring.',
                features: ['Mask Aligner', 'Spin Coater', 'Sputter System', 'E-Beam Evaporator', 'HEPA Filtration'],
                capacity: 10, sqft: '~520 sq ft'
            },
            'tem-room': {
                name: 'TEM Room', number: 'Room 106', type: 'Instrument Suite', typeClass: 'instrument',
                icon: 'fas fa-atom',
                desc: 'Vibration-isolated suite housing the Transmission Electron Microscope (TEM) for sub-nanometer imaging, electron diffraction analysis, and compositional mapping of materials.',
                features: ['TEM System', 'Vibration Isolation', 'Sample Prep Area', 'Climate Control'],
                capacity: 10, sqft: '~350 sq ft'
            },
            'yellow-light': {
                name: 'Yellow Light Room', number: 'Room 120B', type: 'Photolithography', typeClass: 'cleanroom',
                icon: 'fas fa-lightbulb',
                desc: 'Photolithography work area with UV-filtered yellow safelight illumination. Used for photoresist coating, exposure, and development steps that require protection from ambient UV light.',
                features: ['Yellow Safelight', 'Spin Coater', 'Hot Plates', 'Develop Station'],
                capacity: 13, sqft: '~380 sq ft'
            },
            'equip-room': {
                name: 'Equipment Room', number: 'Room 120A', type: 'Support', typeClass: 'support',
                icon: 'fas fa-cogs',
                desc: 'Houses vacuum pumps, gas distribution panels, and support systems that serve cleanroom instruments. Temperature controlled with emergency gas shutoff capability.',
                features: ['Vacuum Pumps', 'Gas Distribution', 'Chilled Water', 'Emergency Shutoff'],
                capacity: 2, sqft: '~280 sq ft'
            },
            'flex-space': {
                name: 'Flex Space', number: 'Room 120', type: 'Configurable Workspace', typeClass: 'workspace',
                icon: 'fas fa-expand-arrows-alt',
                desc: 'Configurable research area for special projects, visiting researchers, and overflow equipment. Can be reconfigured for different use cases as facility needs evolve.',
                features: ['Modular Layout', 'Power & Data Drops', 'Bench Space', 'Equipment Storage'],
                capacity: 64, sqft: '~600 sq ft'
            },
            'storage-c': {
                name: 'Chemical Storage', number: 'Room 120C', type: 'Storage', typeClass: 'support',
                icon: 'fas fa-boxes-stacked',
                desc: 'Chemical and supply storage with proper ventilation, secondary containment, and inventory management for lab consumables and hazardous materials.',
                features: ['Ventilated Cabinets', 'Spill Containment', 'Inventory System'],
                capacity: 2, sqft: '~220 sq ft'
            },
            'open-work': {
                name: 'Open Work Area', number: 'Room 113', type: 'Collaborative Workspace', typeClass: 'workspace',
                icon: 'fas fa-desktop',
                desc: 'Collaborative workspace with data analysis workstations, whiteboard areas, and write-up stations. Used for experiment planning, data review, and team coordination.',
                features: ['Analysis Workstations', 'Whiteboards', 'Meeting Area', 'Printer Station'],
                capacity: 19, sqft: '~550 sq ft'
            },
            'mech': {
                name: 'Mechanical Room', number: 'Room 111', type: 'Building Systems', typeClass: 'support',
                icon: 'fas fa-fan',
                desc: 'HVAC systems, chilled water supply, and environmental controls maintaining cleanroom temperature (68\u00b12\u00b0F), humidity (45\u00b15% RH), and positive pressure differentials.',
                features: ['HVAC Units', 'Chilled Water Loop', 'Air Handling', 'Pressure Monitoring'],
                capacity: 1, sqft: '~320 sq ft'
            },
            'janitor': {
                name: 'Janitorial', number: 'Room 110', type: 'Facility Services', typeClass: 'support',
                icon: 'fas fa-broom',
                desc: 'Building maintenance supplies and cleaning equipment for facility upkeep and specialized cleanroom cleaning protocols.',
                features: ['Cleaning Supplies', 'Maintenance Equipment'],
                capacity: 1, sqft: '~120 sq ft'
            },
            'elect': {
                name: 'Electrical Room', number: 'Room 114', type: 'Power Systems', typeClass: 'support',
                icon: 'fas fa-bolt',
                desc: 'Power distribution panels, transformers, and UPS systems providing clean, uninterrupted power to sensitive laboratory instruments and cleanroom systems.',
                features: ['Power Distribution', 'UPS Systems', 'Transformers', 'Circuit Panels'],
                capacity: 1, sqft: '~160 sq ft'
            },
            'it': {
                name: 'IT Room', number: 'Room 115', type: 'Network Infrastructure', typeClass: 'support',
                icon: 'fas fa-server',
                desc: 'Network infrastructure and data storage supporting lab computing, instrument data collection, remote access, and facility monitoring systems.',
                features: ['Server Rack', 'Network Switches', 'Data Storage', 'Facility Monitoring'],
                capacity: 1, sqft: '~140 sq ft'
            },
            'storage-a': {
                name: 'Storage', number: 'Room 112A', type: 'General Storage', typeClass: 'support',
                icon: 'fas fa-archive',
                desc: 'General supplies, consumables, and overflow equipment storage for day-to-day facility operations.',
                features: ['Shelving', 'Equipment Storage'],
                capacity: 1, sqft: '~100 sq ft'
            },
            'mothers-room': {
                name: "Mother's Room", number: 'Room 112', type: 'Wellness', typeClass: 'support',
                icon: 'fas fa-heart',
                desc: 'Private wellness room for nursing mothers, providing a comfortable and secure space within the facility.',
                features: ['Private & Lockable', 'Comfortable Seating'],
                capacity: 1, sqft: '~100 sq ft'
            }
        };

        /* ── DOM refs ────────────────────────────────────── */
        var panel       = document.getElementById('fex-panel');
        var panelContent= document.getElementById('fex-content');
        var closeBtn    = document.getElementById('fex-close');
        var mapWrap     = document.getElementById('fex-map-wrap');
        var viewport    = document.getElementById('fex-viewport');
        var svgEl       = document.getElementById('fex-svg');
        var tooltip     = document.getElementById('fex-tooltip');
        var tooltipName = document.getElementById('fex-tooltip-name');
        var tooltipType = document.getElementById('fex-tooltip-type');
        var searchInput = document.getElementById('fex-search');
        var searchClear = document.getElementById('fex-search-clear');
        var roomCountEl = document.getElementById('fex-room-count');
        var minimap     = document.getElementById('fex-minimap');
        var minimapVP   = document.getElementById('fex-minimap-vp');
        var filterBtns  = document.querySelectorAll('.fex__filter-btn');
        var rooms       = document.querySelectorAll('.fex-room');
        var activeRoom  = null;
        var activeFilter= 'all';

        /* ── PANEL ───────────────────────────────────────── */
        function openPanel(roomId) {
            var d = roomData[roomId];
            if (!d) return;

            var fl = '';
            d.features.forEach(function (f) {
                fl += '<li><i class="fas fa-check"></i>' + f + '</li>';
            });

            panelContent.innerHTML =
                '<div class="fex__panel-icon fex__panel-icon--' + d.typeClass + '"><i class="' + d.icon + '"></i></div>' +
                '<div class="fex__panel-type">' + d.type + '</div>' +
                '<h3 class="fex__panel-name">' + d.name + '</h3>' +
                '<div class="fex__panel-num">' + d.number + '</div>' +
                '<p class="fex__panel-desc">' + d.desc + '</p>' +
                '<div class="fex__panel-features-title">Key Features &amp; Equipment</div>' +
                '<ul class="fex__panel-features">' + fl + '</ul>' +
                '<div class="fex__panel-meta">' +
                    '<div class="fex__panel-meta-item"><div class="fex__panel-meta-label">Occupancy</div><div class="fex__panel-meta-value">' + d.capacity + '</div></div>' +
                    '<div class="fex__panel-meta-item"><div class="fex__panel-meta-label">Area</div><div class="fex__panel-meta-value">' + d.sqft + '</div></div>' +
                '</div>';

            rooms.forEach(function (r) { r.classList.remove('is-active'); });
            var target = document.querySelector('[data-room="' + roomId + '"]');
            if (target) target.classList.add('is-active');
            activeRoom = roomId;

            panel.classList.add('is-open');
            mapWrap.classList.add('panel-open');
        }

        function closePanel() {
            panel.classList.remove('is-open');
            mapWrap.classList.remove('panel-open');
            rooms.forEach(function (r) { r.classList.remove('is-active'); });
            activeRoom = null;
        }

        /* ── TOOLTIP ─────────────────────────────────────── */
        rooms.forEach(function (room) {
            room.addEventListener('mouseenter', function (e) {
                var id = room.getAttribute('data-room');
                var d = roomData[id];
                if (!d) return;
                tooltipName.textContent = d.name;
                tooltipType.textContent = d.type;
                tooltip.classList.add('is-visible');
            });
            room.addEventListener('mousemove', function (e) {
                var rect = mapWrap.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left) + 'px';
                tooltip.style.top  = (e.clientY - rect.top)  + 'px';
            });
            room.addEventListener('mouseleave', function () {
                tooltip.classList.remove('is-visible');
            });

            room.addEventListener('click', function () {
                tooltip.classList.remove('is-visible');
                var id = room.getAttribute('data-room');
                if (activeRoom === id) { closePanel(); }
                else { openPanel(id); }
            });
            room.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); room.click(); }
            });
        });

        closeBtn.addEventListener('click', closePanel);
        document.addEventListener('click', function (e) {
            if (activeRoom && !panel.contains(e.target) && !e.target.closest('.fex-room') && !e.target.closest('.fex__zoom-btn') && !e.target.closest('.fex__search-wrap') && !e.target.closest('.fex__filter-btn')) {
                closePanel();
            }
        });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePanel(); });

        /* ── SEARCH ─────────────────────────────────────── */
        function runSearch() {
            var q = searchInput.value.trim().toLowerCase();
            searchClear.classList.toggle('is-visible', q.length > 0);

            var matchCount = 0;
            rooms.forEach(function (room) {
                var id = room.getAttribute('data-room');
                var d = roomData[id];
                if (!d) return;

                var text = (d.name + ' ' + d.number + ' ' + d.type + ' ' + d.desc + ' ' + d.features.join(' ')).toLowerCase();
                var matchesSearch = q.length === 0 || text.indexOf(q) !== -1;
                var matchesFilter = activeFilter === 'all' || d.typeClass === activeFilter;
                var show = matchesSearch && matchesFilter;

                room.classList.toggle('is-dimmed', !show);
                room.classList.toggle('is-highlight', show && q.length > 0);
                if (show) matchCount++;
            });

            roomCountEl.textContent = matchCount + ' room' + (matchCount !== 1 ? 's' : '');
        }

        searchInput.addEventListener('input', runSearch);
        searchClear.addEventListener('click', function () {
            searchInput.value = '';
            runSearch();
            searchInput.focus();
        });

        /* ── CATEGORY FILTER ────────────────────────────── */
        filterBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                filterBtns.forEach(function (b) { b.classList.remove('is-active'); });
                btn.classList.add('is-active');
                activeFilter = btn.getAttribute('data-filter');
                runSearch();
            });
        });

        /* ── ZOOM / PAN ──────────────────────────────────── */
        var scale = 1;
        var minScale = 0.8;
        var maxScale = 3;
        var panX = 0, panY = 0;
        var isDragging = false;
        var dragStartX, dragStartY, startPanX, startPanY;
        var zoomLevel = document.getElementById('fex-zoom-level');

        function applyTransform() {
            svgEl.style.transform = 'scale(' + scale + ') translate(' + panX + 'px,' + panY + 'px)';
            zoomLevel.textContent = Math.round(scale * 100) + '%';
            updateMinimap();
        }

        function updateMinimap() {
            if (scale > 1.05) {
                minimap.classList.add('is-visible');
                var vw = 1200 / scale;
                var vh = 760 / scale;
                var vx = (-panX * scale + (1200 * (scale - 1)) / 2) / scale;
                var vy = (-panY * scale + (760 * (scale - 1)) / 2) / scale;
                vx = Math.max(0, Math.min(1200 - vw, vx));
                vy = Math.max(0, Math.min(760 - vh, vy));
                minimapVP.setAttribute('x', vx);
                minimapVP.setAttribute('y', vy);
                minimapVP.setAttribute('width', vw);
                minimapVP.setAttribute('height', vh);
            } else {
                minimap.classList.remove('is-visible');
            }
        }

        document.getElementById('fex-zoom-in').addEventListener('click', function () {
            scale = Math.min(maxScale, scale + 0.25);
            applyTransform();
        });
        document.getElementById('fex-zoom-out').addEventListener('click', function () {
            scale = Math.max(minScale, scale - 0.25);
            if (scale <= 1) { panX = 0; panY = 0; }
            applyTransform();
        });
        document.getElementById('fex-zoom-reset').addEventListener('click', function () {
            scale = 1; panX = 0; panY = 0;
            applyTransform();
        });

        // Mouse wheel zoom
        viewport.addEventListener('wheel', function (e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.max(minScale, Math.min(maxScale, scale + delta));
            if (scale <= 1) { panX = 0; panY = 0; }
            applyTransform();
        }, { passive: false });

        // Pan via drag (only when zoomed in)
        viewport.addEventListener('mousedown', function (e) {
            if (scale <= 1 || e.target.closest('.fex-room')) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            startPanX = panX;
            startPanY = panY;
            viewport.classList.add('is-dragging');
        });
        document.addEventListener('mousemove', function (e) {
            if (!isDragging) return;
            panX = startPanX + (e.clientX - dragStartX) / scale;
            panY = startPanY + (e.clientY - dragStartY) / scale;
            applyTransform();
        });
        document.addEventListener('mouseup', function () {
            isDragging = false;
            viewport.classList.remove('is-dragging');
        });

        /* ── TOUCH PINCH ZOOM & PAN ──────────────────────── */
        var touchStartDist = 0;
        var touchStartScale = 1;
        var touchStartPanX = 0, touchStartPanY = 0;
        var touchStartX = 0, touchStartY = 0;
        var isTouchPanning = false;

        function getTouchDist(t1, t2) {
            var dx = t1.clientX - t2.clientX;
            var dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        viewport.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                touchStartDist = getTouchDist(e.touches[0], e.touches[1]);
                touchStartScale = scale;
            } else if (e.touches.length === 1 && scale > 1) {
                isTouchPanning = true;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartPanX = panX;
                touchStartPanY = panY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var dist = getTouchDist(e.touches[0], e.touches[1]);
                var newScale = touchStartScale * (dist / touchStartDist);
                scale = Math.max(minScale, Math.min(maxScale, newScale));
                if (scale <= 1) { panX = 0; panY = 0; }
                applyTransform();
            } else if (e.touches.length === 1 && isTouchPanning) {
                e.preventDefault();
                panX = touchStartPanX + (e.touches[0].clientX - touchStartX) / scale;
                panY = touchStartPanY + (e.touches[0].clientY - touchStartY) / scale;
                applyTransform();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', function () {
            isTouchPanning = false;
        });

        /* ── KEYBOARD NAV ────────────────────────────────── */
        var roomIds = Object.keys(roomData);
        document.addEventListener('keydown', function (e) {
            if (e.target === searchInput) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                var idx = activeRoom ? roomIds.indexOf(activeRoom) : -1;
                idx = (idx + 1) % roomIds.length;
                openPanel(roomIds[idx]);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                var idx = activeRoom ? roomIds.indexOf(activeRoom) : roomIds.length;
                idx = (idx - 1 + roomIds.length) % roomIds.length;
                openPanel(roomIds[idx]);
            }
        });

    })();
    </script>
